name: Build and Push Docker Image

name: Build and Push Docker Image

on:
  push:
    branches: [main] # Se ejecutará cada vez que subas cambios a 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push
        uses: docker/build-push-action@v6
        with:
          # IMPORTANTE: Pon la ruta donde está tu Dockerfile
          context: ./simexRoutex
          push: true
          # Usará tus secretos para ponerle nombre a la imagen
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/routex_image:latest
