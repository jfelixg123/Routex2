services:
  # El contenedor de Laravel (PHP + Drivers SQL Server)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simex-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/node_modules
      - build_data:/var/www/public/build
      - ./storage/app/public:/var/www/storage/app/public
    networks:
      - simex-network

  # El servidor web Nginx
  nginx:
    image: nginx:alpine
    container_name: simex-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - build_data:/var/www/public/build
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - simex-network
    depends_on:
      - app

networks:
  simex-network:
    driver: bridge

volumes:
  build_data:
