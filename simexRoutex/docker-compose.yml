services:
  # El contenedor de Laravel (PHP + Drivers SQL Server)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simex-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - storage_public:/var/www/storage/app/public
      #- .:/var/www
      #- /var/www/node_modules
      #- build_data:/var/www/public/build
      #- ./storage/app/public:/var/www/storage/app/public
    networks:
      - simex-network

  # El servidor web Nginx
  nginx:
    image: nginx:alpine
    container_name: simex-nginx
    restart: unless-stopped
    volumes:
      - .:/var/www
      - build_data:/var/www/public/build
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - simex-network
    depends_on:
      - app

  # OLLAMA
  ollama:
    image: ollama/ollama:latest
    container_name: simex-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - simex-network
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 10 && ollama pull llama3.1 && wait"

  # N8N
  n8n:
    image: n8nio/n8n:latest
    container_name: simex-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - simex-network

networks:
  simex-network:
    driver: bridge

volumes:
  #build_data:
  storage_public:
  ollama_data:
  n8n_data:

