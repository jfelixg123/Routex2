services:
  # Laravel (PHP-FPM)
  app:
    build:
      context: ./simexRoutex
      dockerfile: Dockerfile
    container_name: simex-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      # Sincronizamos la carpeta del código para que PHP vea el index.php
      - ./simexRoutex:/var/www
    networks:
      - simex-network

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: simex-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # 1. Sincronizamos el código (Nginx necesita ver la carpeta public)
      - ./simexRoutex:/var/www:ro
      # 2. MAPEO CRÍTICO: Archivo de configuración específico
      - ./simexRoutex/docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - simex-network
    depends_on:
      - app

networks:
  simex-network:
    driver: bridge
