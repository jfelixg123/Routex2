services:
  # Laravel (PHP)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simex-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      #- .:/var/www
      #- /var/www/node_modules
      - storage_data:/var/www/storage
      - build_data:/var/www/public/build
      #- ./storage/app/public:/var/www/storage/app/public
    networks:
      - simex-network

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: simex-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www:ro
      #- build_data:/var/www/public/build:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - simex-network
    depends_on:
      - app

networks:
  simex-network:
    external: false

volumes:
  build_data:
