version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simex-app
    restart: unless-stopped
    networks:
      - simex-network

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simex-nginx
    command: >
      sh -c "apt-get update &&
             apt-get install -y nginx &&
             nginx -g 'daemon off;'"
    volumes:
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - simex-network

networks:
  simex-network:
    driver: bridge
