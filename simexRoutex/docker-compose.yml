services:
  # Laravel (PHP-FPM)
  app:
    build:
      context: ./simexRoutex
      dockerfile: Dockerfile
    container_name: simex-app
    restart: unless-stopped
    working_dir: /var/www
    # No mapeamos el código local en producción para que use el del Dockerfile
    networks:
      - simex-network

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: simex-nginx
    restart: unless-stopped
    ports:
      - "80:80"  # Nginx da la cara al mundo en el puerto 80
    volumes:
      # Solo mapeamos la configuración de Nginx
      - ./simexRoutex:/var/www:ro
      - ./simexRoutex/docker/nginx/conf.d:/etc/nginx/conf.d:ro
      # Importante: Nginx necesita ver los archivos estáticos (public)
    networks:
      - simex-network
    depends_on:
      - app

networks:
  simex-network:
    driver: bridge
