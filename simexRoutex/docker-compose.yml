services:
  # Laravel (PHP)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simex-app
    ports:
      - "8000:8000"
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/node_modules
      - build_data:/var/www/public/build
      - ./storage/app/public:/var/www/storage/app/public
    networks:
      - simex-network

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: simex-nginx
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - .:/var/www
      - build_data:/var/www/public/build
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - simex-network
    depends_on:
      - app

    # OLLAMA
  ollama:
    image: ollama/ollama:latest
    container_name: simex-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - simex-network
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 10 && ollama pull llama3.1 && wait"


  # N8N Servicio
  n8n:
    image: n8nio/n8n:latest
    container_name: simex-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - simex-network

  # SPARK
  spark:
    image: apache/spark:3.5.1
    container_name: simex-spark
    environment:
      - SPARK_MODE=master
    volumes:
      - ./datos:/opt/spark/datos
      - ./spark-warehouse:/opt/spark/spark-warehouse
    ports:
      - "10000:10000"
      - "8081:8080"
      - "4040:4040"
    command: /bin/bash -c "/opt/spark/sbin/start-thriftserver.sh --master local[*] --conf spark.sql.warehouse.dir=/opt/spark/spark-warehouse; tail -f /opt/spark/logs/*.out"
    networks:
      - simex-network

  # SUPERSET
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=clase_datos_2024
      - PYTHONPATH=/app/pythonpath
    depends_on:
      - spark
    volumes:
      - ./superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
    command: >
      /bin/bash -c "mkdir -p /app/superset_home && superset db upgrade && superset fab create-admin --username admin --firstname admin --lastname admin --email admin@admin.com --password admin && superset init && /usr/bin/run-server.sh --host 0.0.0.0 --port 8088"
    networks:
      - simex-network

networks:
  simex-network:
    driver: bridge

volumes:
  build_data:
  ollama_data:
  n8n_data: