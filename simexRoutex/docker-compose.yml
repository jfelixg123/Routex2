services:
  app:
    build:
      context: ./simexRoutex
      dockerfile: Dockerfile
    container_name: simex-app
    restart: unless-stopped
    # FORZAMOS a que PHP trabaje donde está el artisan
    working_dir: /var/www
    volumes:
      - ./simexRoutex:/var/www
    networks:
      - simex-network

  nginx:
    image: nginx:alpine
    container_name: simex-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./simexRoutex:/var/www:ro
      - ./simexRoutex/docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - simex-network
    depends_on:
      - app

networks:
  simex-network:
    driver: bridge
