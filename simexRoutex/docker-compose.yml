services:
  app:
    build:
      context: ./simexRoutex
      dockerfile: Dockerfile
    container_name: simex-app
    restart: unless-stopped
    networks:
      - simex-network

  nginx:
    image: nginx:alpine
    container_name: simex-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # SÓLO mapeamos el archivo de configuración, nada de código
      - ./simexRoutex/docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - simex-network
    depends_on:
      - app

networks:
  simex-network:
    driver: bridge
